<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>ИИ Бизнес Наставник</title>

  <!-- PWA мета-теги для standalone режима -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ИИ Ассистент">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1f2937">

  <!-- Убираем выделение на мобильных -->
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-tap-highlight" content="no">

  <!-- Дополнительные мета-теги для запрета pull-to-refresh -->
  <meta name="overscroll-behavior" content="none">
  <meta name="apple-touch-fullscreen" content="no">

  <!-- Стили для правильного отображения в браузере и PWA -->
  <style>
    html,
    body {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      margin: 0;
      padding: 0;
      overscroll-behavior-y: none;
      overflow-x: hidden;
    }

    #root {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
      box-sizing: border-box;
    }

    /* Для PWA mode скрываем system UI */
    @media (display-mode: standalone) {

      html,
      body {
        height: 100vh;
        height: 100dvh;
      }
    }

    /* Для fullscreen PWA */
    @media (display-mode: fullscreen) {

      html,
      body {
        height: 100vh;
        height: 100dvh;
      }
    }
  </style>

  <!-- Иконки для PWA -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="48x48" href="/icon-48.png">
  <link rel="icon" type="image/png" sizes="72x72" href="/icon-72.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/icon-96.png">
  <link rel="icon" type="image/png" sizes="144x144" href="/icon-144.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icon-144.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/icon-144.png">

  <!-- Windows Tiles -->
  <meta name="msapplication-TileImage" content="/icon-144.png">
  <meta name="msapplication-TileColor" content="#3b82f6">

  <!-- Манифест PWA -->
  <link rel="manifest" href="/manifest.json">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
  <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
</body>

</html>
